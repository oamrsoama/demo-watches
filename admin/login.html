<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Demo Watches</title>
  <link rel="stylesheet" href="../css/admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌚</text></svg>" />
</head>
<body>
<canvas id="starfield"></canvas>
<div class="toast-wrap" id="toast-wrap"></div>

<div class="login-pg">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">⌚</div>
      <div class="login-name">DEMO WATCHES</div>
      <div class="login-sub2">Admin Panel</div>
    </div>

    <h2 class="login-title">تسجيل الدخول</h2>
    <p class="login-desc">أدخل بياناتك للوصول إلى لوحة الإدارة</p>

    <div class="login-err hidden" id="login-err">❌ اسم المستخدم أو كلمة المرور غير صحيحة</div>

    <form onsubmit="handleLogin(event)">
      <div class="f-grp">
        <label>اسم المستخدم</label>
        <input type="text" id="uname" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="f-grp">
        <label>كلمة المرور</label>
        <input type="password" id="upass" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-btn" id="login-btn">🔐 دخول</button>
    </form>

    <div class="login-demo">
      المستخدم: <code>admin</code> &nbsp;|&nbsp; كلمة المرور: <code>watches2024</code>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/starfield.js"></script>
<script>
  if (localStorage.getItem('dw_admin_auth') === 'true') location.href = 'index.html';

  async function handleLogin(e) {
    e.preventDefault();
    const u   = document.getElementById('uname').value.trim();
    const p   = document.getElementById('upass').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-err');

    btn.disabled = true; btn.textContent = '⏳ جارٍ التحقق...';
    err.classList.add('hidden');

    await new Promise(r => setTimeout(r, 450));

    let ok = false;
    if (supabaseClient) {
      try {
        const { data } = await supabaseClient.from('admin_users').select('*').eq('username', u).single();
        if (data?.password_hash === p) ok = true;
      } catch (_) {}
    }
    if (!ok && u === ADMIN_USERNAME && p === ADMIN_PASSWORD) ok = true;

    if (ok) {
      localStorage.setItem('dw_admin_auth', 'true');
      localStorage.setItem('dw_admin_user', u);
      location.href = 'index.html';
    } else {
      err.classList.remove('hidden');
      btn.disabled = false; btn.textContent = '🔐 دخول';
    }
  }
</script>
</body>
</html>
